<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>404 — 30 Days of Dahl</title>
	<meta name="robots" content="noindex">
	<link rel="icon" href="/favicon.ico" sizes="48x48">
	<!-- Self-contained on purpose: an error page should never depend on
	     the assets that may be the very thing that went missing. -->
	<style>
		*{ box-sizing:border-box; }
		body{
			margin:0; min-height:100vh; display:grid; place-items:center;
			background:#0b0a08; color:#ece5d3; text-align:center;
			font-family:"Chakra Petch","Bahnschrift",ui-monospace,"Segoe UI",sans-serif;
			background-image:radial-gradient(130% 55% at 50% -12%, rgba(240,179,84,.08), transparent 60%);
		}
		.hex{
			width:84px; height:92px; margin:0 auto 22px; position:relative;
			clip-path:polygon(50% 2%, 96% 26%, 96% 74%, 50% 98%, 4% 74%, 4% 26%);
			box-shadow:inset 0 0 0 1.5px #f0b354;
			display:grid; place-items:center;
		}
		.hex span{ font-family:"Rajdhani","Bahnschrift","Arial Narrow",sans-serif; font-weight:700; font-size:26px; color:#f0b354; }
		h1{ font-family:"Rajdhani","Bahnschrift","Arial Narrow",sans-serif; font-weight:700; font-size:18px; letter-spacing:.3em; text-transform:uppercase; margin:0 0 8px; }
		p{ color:#9a8f77; font-size:13.5px; margin:0 auto 26px; max-width:300px; }
		a{
			display:inline-block; padding:13px 26px; color:#f0b354; text-decoration:none;
			background:linear-gradient(180deg,#241a08,#171105); border:1px solid #8a5a1a;
			font-family:"Rajdhani","Bahnschrift","Arial Narrow",sans-serif; font-weight:700;
			font-size:14px; letter-spacing:.28em; text-transform:uppercase;
			clip-path:polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
		}
	</style>
</head>
<body>
	<main>
		<div class="hex"><span>404</span></div>
		<h1>Signal lost</h1>
		<p>This sector doesn't exist. There is only one page — the protocol.</p>
		<a href="/">◄ Return to base</a>
	</main>
</body>
</html>
